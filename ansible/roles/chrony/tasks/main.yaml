---
- name: make sure chrony is installed
  ansible.builtin.apt:
    name: chrony
    state: present

- name: set timezone
  community.general.timezone:
    name: "{{ timezone_name }}"

- name: deploy chrony.conf template
  template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: 0644
    backup: yes
  notify: restart chrony