---
- name: Ensure admin group exists
  ansible.builtin.group:
    name: "{{ admin_group }}"
    state: present

- name: Create admin user
  ansible.builtin.user:
    name: "{{ admin_user }}"
    group: "{{ admin_group }}"
    groups: sudo
    append: true
    shell: "{{ admin_shell }}"
    create_home: true
    state: present

- name: Set authorized SSH key for admin user
  ansible.posix.authorized_key:
    user: "{{ admin_user }}"
    key: "{{ admin_ssh_public_key }}"
    state: present
  when: admin_ssh_public_key | length > 0

- name: Allow passwordless sudo for admin user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ admin_user }}"
    content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  when: admin_passwordless_sudo

- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: "PermitRootLogin {{ ssh_permit_root_login }}"
    state: present
  notify: Restart ssh

- name: Configure password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: "PasswordAuthentication {{ ssh_password_authentication }}"
    state: present
  notify: Restart ssh

- name: Configure public key authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PubkeyAuthentication'
    line: "PubkeyAuthentication {{ ssh_pubkey_authentication }}"
    state: present
  notify: Restart ssh